name: Deploy Widget CDN

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-widget-cdn.yml'
      - 'frontend/dist/chatroom.min.js'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare Pages payload
        run: |
          mkdir -p publish
          cp frontend/dist/chatroom.min.js publish/chatroom.min.js
          touch publish/.nojekyll
          cat > publish/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Stimulize Widget CDN</title>
            </head>
            <body>
              <p><a href="./chatroom.min.js">chatroom.min.js</a></p>
            </body>
          </html>
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
